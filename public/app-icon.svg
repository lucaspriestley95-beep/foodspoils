<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A34A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0FFF4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- Leaf icon -->
  <g transform="translate(256, 256)">
    <!-- Leaf shape -->
    <path d="
      M 0,-120
      C 60,-100 100,-40 100,10
      C 100,70 60,110 0,120
      C -60,110 -100,70 -100,10
      C -100,-40 -60,-100 0,-120
      Z
    " fill="url(#leaf-grad)" opacity="0.95" />

    <!-- Leaf vein center -->
    <path d="M 0,-100 L 0,100" stroke="#22C55E" stroke-width="4" stroke-linecap="round" opacity="0.3" />

    <!-- Side veins -->
    <path d="M 0,-30 L 40,-60" stroke="#22C55E" stroke-width="3" stroke-linecap="round" opacity="0.2" />
    <path d="M 0,-30 L -40,-60" stroke="#22C55E" stroke-width="3" stroke-linecap="round" opacity="0.2" />
    <path d="M 0,10 L 50,-10" stroke="#22C55E" stroke-width="3" stroke-linecap="round" opacity="0.2" />
    <path d="M 0,10 L -50,-10" stroke="#22C55E" stroke-width="3" stroke-linecap="round" opacity="0.2" />
    <path d="M 0,50 L 35,30" stroke="#22C55E" stroke-width="3" stroke-linecap="round" opacity="0.2" />
    <path d="M 0,50 L -35,30" stroke="#22C55E" stroke-width="3" stroke-linecap="round" opacity="0.2" />

    <!-- Clock circle overlaid -->
    <circle cx="40" cy="-30" r="38" fill="white" opacity="0.95" />
    <circle cx="40" cy="-30" r="38" fill="none" stroke="#22C55E" stroke-width="3" opacity="0.3" />

    <!-- Clock hands -->
    <line x1="40" y1="-30" x2="40" y2="-52" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" />
    <line x1="40" y1="-30" x2="60" y2="-25" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" />
    <circle cx="40" cy="-30" r="3" fill="#16A34A" />
  </g>
</svg>